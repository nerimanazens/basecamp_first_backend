<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <section class="register flex items-center justify-center gap-10 h-screen">


        <form class="flex flex-col bg-white rounded-[15px] shadow-lg p-8 w-[350px] m-0">
            <h1 class="font-bold text-[25px]">Create Account</h1>
            <p class="text-gray-600">Create a new account to get started.</p>

            <label for="username" class="mt-4">Username</label>
            <input type="text" id="username" placeholder="Username" required class="border border-gray-300 rounded-md p-1.5 bg-[#F8FAFC] focus:outline-none focus:ring-1 focus:ring-blue-500">

            <label for="email" class="mt-4">Email</label>
            <input type="email" id="email" placeholder="Email" required class="border border-gray-300 rounded-md p-1.5 bg-[#F8FAFC] focus:outline-none focus:ring-1 focus:ring-blue-500">

            <label for="password" class="mt-4">Password</label>
            <input type="password" id="password" placeholder="Password" required class="border border-gray-300 rounded-md p-1.5 bg-[#F8FAFC] focus:outline-none focus:ring-1 focus:ring-blue-500">

            <label for="confirm-password" class="mt-4">Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Confirm Password" required class="border border-gray-300 rounded-md p-1.5 bg-[#F8FAFC] focus:outline-none focus:ring-1 focus:ring-blue-500">

            <button id="create-account-btn" type="submit" class="w-full bg-[#0D59F2] text-white py-2 px-4 rounded-md hover:bg-[#0B48C8] mt-4">Create Account</button>

            <span class="text-gray-900 text-sm mt-4 text-center">Already have an account? <a href="login.html" class="text-blue-800">Login here</a></span>
        </form>


    </section>

    <script src="../js/register.js"></script>
</body>

</html>
