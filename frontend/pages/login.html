<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <section class="login flex flex-col items-center justify-center h-screen">
        <i class="fa-solid fa-lock-open p-4 text-xl bg-blue-500 text-white rounded-full"></i>
        <h1 class="font-bold text-[25px]">Welcome Back</h1>
        <p class="text-gray-600">Please enter your credentials to access your account.</p>

        <form class="flex flex-col bg-white rounded-[15px] shadow-lg p-8 w-[350px] m-0 mt-6">
            <label for="email">Email adress</label>
            <input type="email" id="email" placeholder="Email" required class="border border-gray-300 rounded-md p-1.5 bg-[#F8FAFC] focus:outline-none focus:ring-1 focus:ring-blue-500">
            <label for="password" class="mt-4">Password</label>
            <input type="password" id="password" placeholder="Password" required class="border border-gray-300 rounded-md p-1.5 bg-[#F8FAFC] focus:outline-none focus:ring-1 focus:ring-blue-500">
            <button type="submit" class="w-full bg-[#0D59F2] text-white py-2 px-4 rounded-md hover:bg-[#0B48C8] mt-4">Login</button>
        </form>

        <span class="text-gray-900 text-sm mt-4 text-center">Don't have an account? <a href="register.html" class="text-blue-800">Register here</a></span>
    </section>


    <script src="../js/login.js"></script>
</body>
</html>
